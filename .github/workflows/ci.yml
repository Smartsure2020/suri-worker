name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax-check all worker sources
        run: |
          for f in *.js; do node --check "$f"; done
      - name: Run tests (zero-dependency, node --test)
        run: npm test
