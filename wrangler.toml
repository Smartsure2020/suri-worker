# =============================================================
# Suri — Cloudflare Worker config
# =============================================================

name       = "suri-worker"
main       = "suri-worker.js"
compatibility_date = "2025-04-01"

# Cloudflare Queue for async Claude processing
[[queues.producers]]
queue      = "suri-processing-queue"
binding    = "SURI_QUEUE"

# Environment variables (secrets set via `wrangler secret put`)
# Do NOT put real values here — use `wrangler secret put VAR_NAME`
[vars]
ENVIRONMENT = "production"

# Secrets (set with: wrangler secret put SECRET_NAME)
# SUPABASE_URL
# SUPABASE_SERVICE_KEY
# AZURE_TENANT_ID
# AZURE_CLIENT_ID
# AZURE_CLIENT_SECRET
# SURI_MAILBOX              (e.g. claims@smartsure.co.za)
# M365_WEBHOOK_SECRET       (random string, set in M365 subscription + here)
# PORTAL_API_KEY            (random string, used by Cloudflare Pages frontend)

# Routes — update to your actual domain

# =============================================================
# Processor worker (separate worker, consumes the same queue)
# See wrangler.processor.toml — deploy with:
#   wrangler deploy --config wrangler.processor.toml
# =============================================================
